
services:
    web:
        image: mmi3docker/symfony-2024
        container_name: symfony-web
        hostname: symfony-web
        restart: always
        ports:
            - 8326:80
        depends_on:
            - db
            - gotenberg
        environment:
            GOTENBERG_URL: http://gotenberg:3000
        volumes:
            - ./www/:/var/www/
            - ./sites/:/etc/apache2/sites-enabled/

    db:
        image: mariadb:10.8
        container_name: symfony-db
        hostname: symfony-db
        restart: always

        volumes:
            - db-volume:/var/lib/mysql

        environment:
            MYSQL_ROOT_PASSWORD: PASSWORD
            MYSQL_DATABASE: symfony
            MYSQL_USER: symfony
            MYSQL_PASSWORD: PASSWORD

    phpmyadmin:
        image: phpmyadmin/phpmyadmin
        container_name: symfony-adminsql
        hostname: symfony-adminsql
        restart: always
        ports:
            - 8080:80
        environment:
            PMA_HOST: db
            MYSQL_ROOT_PASSWORD: PASSWORD
            MYSQL_USER: symfony
            MYSQL_PASSWORD: PASSWORD
            MYSQL_DATABASE: symfony    
            
    maildev:
        image: maildev/maildev
        container_name: symfony-mail
        hostname: symfony-mail
        command: bin/maildev --web 1080 --smtp 1025 --hide-extensions STARTTLS
        restart: always
        ports:
            - 1080:1080

    gotenberg:
        image: gotenberg/gotenberg:8
        container_name: symfony-gotenberg
        hostname: gotenberg
        restart: always
        ports:
            - 3000:3000

volumes:
    db-volume:
